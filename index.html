  <style>
    :root {
      --bg: #050505;
      --bg-soft: #0b0b0c;
      --white: #f7f4ef;
      --muted: rgba(247, 244, 239, 0.56);
      --muted-2: rgba(247, 244, 239, 0.32);
      --red: #d40f16;
      --red-hot: #ff2a2f;
      --red-dark: #5d0507;
      --line: rgba(255, 255, 255, 0.09);
      --line-strong: rgba(255, 255, 255, 0.16);
      --glass: rgba(255, 255, 255, 0.035);
      --shadow: rgba(0, 0, 0, 0.65);
      --display: "Syne", "Inter", system-ui, sans-serif;
      --body: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      background: var(--bg);
      color: var(--white);
      scroll-behavior: smooth;
    }

    body {
      width: 100%;
      min-width: 0;
      min-height: 100svh;
      margin: 0;
      overflow-x: clip;
      background: var(--bg);
      color: var(--white);
      font-family: var(--body);
      text-rendering: geometricPrecision;
      -webkit-font-smoothing: antialiased;
      isolation: isolate;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -3;
    }

    body::before {
      background:
        radial-gradient(circle at var(--mx, 50%) var(--my, 32%), rgba(212, 15, 22, 0.22), transparent 28rem),
        radial-gradient(circle at 50% 18%, rgba(212, 15, 22, 0.22), transparent 30rem),
        radial-gradient(circle at 86% 84%, rgba(212, 15, 22, 0.13), transparent 26rem),
        linear-gradient(180deg, #050505 0%, #090909 54%, #040404 100%);
      animation: atmosphere 12s ease-in-out infinite alternate;
    }

    body::after {
      opacity: 0.23;
      background-image:
        linear-gradient(rgba(255,255,255,0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 96px 96px;
      mask-image: radial-gradient(circle at 50% 48%, black, transparent 74%);
    }

    @keyframes atmosphere {
      from { filter: saturate(1) brightness(1); }
      to { filter: saturate(1.18) brightness(1.06); }
    }

    .page {
      position: relative;
      width: min(100%, 1720px);
      min-height: 100svh;
      margin-inline: auto;
      padding: clamp(1.25rem, 2.4vw, 2.8rem);
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: clamp(1.6rem, 3vh, 3.2rem);
    }

    .noise {
      position: fixed;
      inset: -30%;
      z-index: -2;
      pointer-events: none;
      opacity: 0.12;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.7'/%3E%3C/svg%3E");
      transform: translateZ(0);
      animation: grain 9s steps(8) infinite;
    }

    @keyframes grain {
      0%, 100% { transform: translate3d(0,0,0); }
      20% { transform: translate3d(-2%, 1%, 0); }
      40% { transform: translate3d(1%, -2%, 0); }
      60% { transform: translate3d(2%, 1%, 0); }
      80% { transform: translate3d(-1%, 2%, 0); }
    }

    .orb {
      position: fixed;
      width: 28rem;
      height: 28rem;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(212, 15, 22, 0.26), rgba(212, 15, 22, 0.04) 42%, transparent 70%);
      filter: blur(18px);
      opacity: 0.82;
      pointer-events: none;
      z-index: -1;
      animation: floatOrb 11s ease-in-out infinite alternate;
    }

    .orb.one { top: 12%; left: 13%; }
    .orb.two { right: -10rem; bottom: 4%; width: 34rem; height: 34rem; animation-delay: -4s; }

    @keyframes floatOrb {
      from { transform: translate3d(0, 0, 0) scale(1); }
      to { transform: translate3d(1.4rem, -1.1rem, 0) scale(1.08); }
    }

    .topbar {
      position: relative;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      color: var(--white);
      text-decoration: none;
      user-select: none;
      min-width: 0;
      transform: translateY(0);
      transition: transform 260ms ease, opacity 260ms ease;
    }

    .brand:hover {
      transform: translateY(-2px);
    }

    .brand:hover .brand-mark {
      transform: translateY(-0.18rem) rotate(-3deg) scale(1.08);
      border-color: rgba(255, 42, 47, 0.34);
      box-shadow:
        0 0 0 1px rgba(255, 42, 47, 0.22),
        0 0 32px rgba(212, 15, 22, 0.28),
        0 24px 70px rgba(0, 0, 0, 0.38);
    }

    .brand:hover .brand-mark img {
      transform: scale(1.08) rotate(2deg);
      filter: drop-shadow(0 0 22px rgba(255, 42, 47, 0.5));
      animation: logoGlitch 680ms cubic-bezier(.16,1,.3,1);
    }

    .brand:hover .wordmark {
      text-shadow: 0 0 22px rgba(255, 42, 47, 0.28);
    }

    .brand:active .brand-mark {
      transform: translateY(0) scale(0.98);
    }

    .brand-mark {
      position: relative;
      width: clamp(2rem, 3vw, 2.8rem);
      height: clamp(2rem, 3vw, 2.8rem);
      display: grid;
      place-items: center;
      border-radius: 0.9rem;
      background: rgba(255,255,255,0.045);
      border: 1px solid rgba(255,255,255,0.09);
      box-shadow: 0 0 0 1px rgba(212,15,22,0.12), 0 18px 50px rgba(0,0,0,0.25);
      overflow: hidden;
      transform-origin: center;
      transition: transform 320ms cubic-bezier(.16,1,.3,1), border-color 320ms ease, box-shadow 320ms ease;
    }

    .brand-mark::before {
      content: "";
      position: absolute;
      inset: -40%;
      background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.22), transparent 62%);
      opacity: 0;
      transform: translateX(-42%) rotate(18deg);
      transition: opacity 280ms ease, transform 680ms cubic-bezier(.16,1,.3,1);
      pointer-events: none;
    }

    .brand:hover .brand-mark::before {
      opacity: 1;
      transform: translateX(42%) rotate(18deg);
    }

    .brand-mark img {
      width: 78%;
      height: 78%;
      display: block;
      object-fit: contain;
      filter: drop-shadow(0 0 14px rgba(212, 15, 22, 0.24));
      transform-origin: center;
      transition: transform 320ms cubic-bezier(.16,1,.3,1), filter 320ms ease;
    }

    @keyframes logoGlitch {
      0%, 100% { transform: scale(1.08) rotate(2deg); }
      18% { transform: scale(1.12) rotate(-2deg) translateX(1px); }
      34% { transform: scale(1.06) rotate(3deg) translateX(-1px); }
      52% { transform: scale(1.1) rotate(-1deg); }
      74% { transform: scale(1.08) rotate(2deg); }
    }

    .wordmark {
      font-family: var(--display);
      font-weight: 800;
      font-size: clamp(1.12rem, 1.9vw, 1.6rem);
      line-height: 1;
      letter-spacing: -0.075em;
      text-transform: uppercase;
      white-space: nowrap;
      transition: text-shadow 300ms ease, transform 300ms ease;
    }

    .wordmark .red { color: var(--red-hot); }

    .phase {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      min-width: max-content;
      padding: 0.55rem 0.8rem;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 16px 40px rgba(0,0,0,0.22);
      backdrop-filter: blur(16px);
      color: rgba(255,255,255,0.86);
      font-size: clamp(0.62rem, 1vw, 0.78rem);
      font-weight: 800;
      letter-spacing: 0.23em;
      text-transform: uppercase;
    }

    .phase-dot {
      width: 0.42rem;
      height: 0.42rem;
      border-radius: 50%;
      background: var(--red-hot);
      box-shadow: 0 0 0 0 rgba(255, 42, 47, 0.72);
      animation: ping 1.8s ease-out infinite;
    }

    @keyframes ping {
      0% { box-shadow: 0 0 0 0 rgba(255, 42, 47, 0.72); }
      72%, 100% { box-shadow: 0 0 0 0.55rem rgba(255, 42, 47, 0); }
    }

    .hero {
      position: relative;
      z-index: 2;
      display: grid;
      place-items: center;
      min-height: min(58rem, calc(100svh - 14rem));
      padding-block: clamp(2rem, 5vh, 4.5rem);
      text-align: center;
    }

    .hero-inner {
      width: min(100%, 78rem);
      display: grid;
      justify-items: center;
      gap: clamp(1.25rem, 2.5vw, 2rem);
    }

    .kicker {
      position: relative;
      color: rgba(255,255,255,0.46);
      font-size: clamp(0.68rem, 1.2vw, 0.9rem);
      font-weight: 800;
      letter-spacing: clamp(0.3em, 0.75vw, 0.62em);
      text-transform: uppercase;
      padding-inline: 1rem;
      opacity: 0;
      animation: revealUp 780ms 160ms cubic-bezier(.16,1,.3,1) forwards;
    }

    .kicker::before,
    .kicker::after {
      content: "";
      position: absolute;
      top: 50%;
      width: clamp(2rem, 8vw, 6rem);
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,15,22,0.85), transparent);
    }

    .kicker::before { right: 100%; }
    .kicker::after { left: 100%; }

    h1 {
      position: relative;
      margin: 0;
      width: min(100%, 64rem);
      color: var(--white);
      font-family: var(--display);
      font-size: clamp(3.15rem, 9vw, 8.2rem);
      font-weight: 800;
      line-height: 0.86;
      letter-spacing: clamp(-0.09em, -0.7vw, -0.045em);
      text-transform: uppercase;
      text-wrap: balance;
      opacity: 0;
      animation: revealUp 900ms 260ms cubic-bezier(.16,1,.3,1) forwards;
    }

    h1 .outline {
      display: block;
      color: transparent;
      -webkit-text-stroke: 1px rgba(255,255,255,0.22);
      text-stroke: 1px rgba(255,255,255,0.22);
      opacity: 0.82;
      transform: scaleX(1.015);
    }

    h1 .flicker {
      position: relative;
      animation: unmatchedFlicker 6.8s infinite;
      will-change: opacity, filter, text-shadow;
    }

    h1 .flicker::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      color: transparent;
      -webkit-text-stroke: 1px rgba(255,42,47,0.22);
      text-stroke: 1px rgba(255,42,47,0.22);
      opacity: 0;
      filter: blur(0.8px);
      transform: translateX(0.025em);
      pointer-events: none;
      animation: unmatchedGhost 6.8s infinite;
    }

    @keyframes unmatchedFlicker {
      0%, 6%, 10%, 14%, 31%, 35%, 38%, 100% {
        opacity: 0.82;
        filter: none;
        text-shadow: none;
      }
      7.5%, 12.5%, 33%, 36.5% {
        opacity: 0.28;
        filter: brightness(1.7);
        text-shadow: 0 0 1.4rem rgba(255,42,47,0.32);
      }
      8.5%, 13.2%, 34%, 37.2% {
        opacity: 0.96;
        filter: brightness(1.05);
      }
    }

    @keyframes unmatchedGhost {
      0%, 6%, 10%, 14%, 31%, 35%, 38%, 100% { opacity: 0; }
      7.5%, 12.5%, 33%, 36.5% { opacity: 0.34; }
      8.5%, 13.2%, 34%, 37.2% { opacity: 0.08; }
    }

    h1 .solid {
      display: block;
      color: var(--white);
      text-shadow: 0 0 36px rgba(255,255,255,0.05);
    }

    h1 .redword {
      color: var(--red-hot);
      text-shadow: 0 0 35px rgba(212,15,22,0.26);
    }

    .subline {
      width: min(100%, 41rem);
      margin: -0.25rem 0 0;
      color: rgba(255,255,255,0.68);
      font-size: clamp(0.95rem, 1.4vw, 1.12rem);
      line-height: 1.7;
      letter-spacing: 0.035em;
      opacity: 0;
      animation: revealUp 860ms 420ms cubic-bezier(.16,1,.3,1) forwards;
    }

    .countdown {
      width: min(100%, 42rem);
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: clamp(0.65rem, 1.7vw, 1.2rem);
      padding-top: 0.75rem;
      opacity: 0;
      animation: revealUp 900ms 560ms cubic-bezier(.16,1,.3,1) forwards;
    }

    .time-card {
      position: relative;
      min-width: 0;
      padding: clamp(1rem, 1.75vw, 1.35rem) 0.5rem;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: clamp(0.85rem, 1.6vw, 1.15rem);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.018)),
        rgba(255,255,255,0.018);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 30px 80px rgba(0,0,0,0.18);
      backdrop-filter: blur(18px);
      overflow: hidden;
      transition: transform 300ms ease, border-color 300ms ease, background 300ms ease;
    }

    .time-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(212,15,22,0.26), transparent 52%);
      opacity: 0;
      transition: opacity 300ms ease;
    }

    .time-card:hover {
      transform: translateY(-0.35rem);
      border-color: rgba(255,42,47,0.35);
      background: rgba(255,255,255,0.045);
    }

    .time-card:hover::after { opacity: 1; }

    .num {
      position: relative;
      z-index: 1;
      display: block;
      font-family: var(--display);
      font-size: clamp(1.9rem, 4.2vw, 3.45rem);
      font-weight: 800;
      line-height: 0.9;
      letter-spacing: -0.06em;
      font-variant-numeric: tabular-nums;
      transition: transform 220ms ease, opacity 220ms ease, color 220ms ease;
    }

    .num.tick {
      transform: translateY(-0.18rem) scale(1.015);
      color: var(--red-hot);
      opacity: 0.88;
    }

    .label {
      position: relative;
      z-index: 1;
      display: block;
      margin-top: 0.42rem;
      color: rgba(255,255,255,0.44);
      font-size: clamp(0.58rem, 1vw, 0.72rem);
      font-weight: 800;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .seal {
      position: absolute;
      right: clamp(-8rem, -7vw, -4rem);
      top: 13%;
      width: clamp(19rem, 33vw, 38rem);
      aspect-ratio: 1;
      pointer-events: none;
      opacity: 0.07;
      filter: drop-shadow(0 0 4rem rgba(212, 15, 22, 0.38));
      animation: sealFloat 9s ease-in-out infinite alternate;
    }

    .seal img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    @keyframes sealFloat {
      from { transform: translate3d(0, 0, 0) rotate(-2deg); }
      to { transform: translate3d(-0.8rem, 0.5rem, 0) rotate(1deg); }
    }

    .bottom {
      position: relative;
      z-index: 5;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: clamp(1rem, 3vw, 3rem);
      color: rgba(255,255,255,0.38);
      font-size: clamp(0.72rem, 1vw, 0.86rem);
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .bottom-line {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.14), transparent);
    }

    .launching strong {
      color: rgba(255,255,255,0.9);
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    .accent-strip {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,15,22,0.65), transparent);
      opacity: 0.55;
    }

    .cursor-glow {
      position: fixed;
      left: 0;
      top: 0;
      width: 20rem;
      height: 20rem;
      border-radius: 50%;
      pointer-events: none;
      z-index: -1;
      transform: translate3d(calc(var(--mx, 50vw) - 10rem), calc(var(--my, 50vh) - 10rem), 0);
      background: radial-gradient(circle, rgba(255, 42, 47, 0.13), transparent 67%);
      filter: blur(24px);
      transition: transform 90ms linear;
    }

    .live-note {
      grid-column: 1 / -1;
      padding: 1.25rem;
      border: 1px solid rgba(255,42,47,0.18);
      border-radius: 1rem;
      background: rgba(212,15,22,0.08);
      color: var(--white);
      font-family: var(--display);
      font-size: clamp(1.35rem, 4vw, 2.4rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      text-transform: uppercase;
    }

    @keyframes revealUp {
      from { opacity: 0; transform: translateY(2rem); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 980px) {
      .page {
        min-height: 100svh;
        gap: 1rem;
      }

      .hero {
        min-height: calc(100svh - 13rem);
      }

      .seal {
        right: -12rem;
        top: 7rem;
        width: 28rem;
        opacity: 0.055;
      }
    }

    @media (max-width: 720px) {
      .page {
        padding: 1.1rem;
        gap: 0.8rem;
      }

      .topbar {
        gap: 0.75rem;
      }

      .phase {
        padding: 0.48rem 0.65rem;
        letter-spacing: 0.14em;
      }

      .brand { gap: 0.55rem; }
      .brand-mark { border-radius: 0.72rem; }

      .hero {
        min-height: calc(100svh - 10.5rem);
        padding-block: 1.25rem 1rem;
      }

      h1 {
        width: 100%;
        font-size: clamp(3.25rem, 16vw, 5.8rem);
        line-height: 0.9;
      }

      .kicker { letter-spacing: 0.28em; }

      .countdown {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        width: min(100%, 25rem);
      }

      .bottom {
        grid-template-columns: 1fr;
        justify-items: center;
        gap: 0.45rem;
        text-align: center;
      }

      .bottom-line {
        width: min(100%, 18rem);
        order: 2;
      }
    }

    @media (max-width: 430px) {
      .topbar {
        align-items: flex-start;
      }

      .phase {
        max-width: 10.2rem;
        justify-content: center;
        text-align: center;
      }

      .wordmark { font-size: 1.05rem; }
      .subline { font-size: 0.94rem; }
      .countdown { gap: 0.62rem; }
      .time-card { padding: 0.86rem 0.4rem; }
    }

    @media (max-width: 560px) {
      .kicker::before,
      .kicker::after {
        width: 1.75rem;
      }

      h1 {
        font-size: clamp(2.85rem, 18vw, 4.95rem);
        letter-spacing: -0.075em;
      }

      .phase {
        font-size: 0.55rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

    function setValue(id, value) {
      const el = document.getElementById(id);
      if (!el) return;
      const next = String(value);
      if (previous.get(id) === next) return;
      previous.set(id, next);
      el.classList.remove("tick");
      void el.offsetWidth;
      el.textContent = next;
      el.classList.add("tick");
      window.setTimeout(() => el.classList.remove("tick"), 220);
    }

    function updateCountdown() {
      const now = Date.now();
      const diff = launchDate - now;
      const countdown = document.querySelector(".countdown");

      if (diff <= 0) {
        if (countdown) {
          countdown.innerHTML = '<div class="live-note">RedRuff is live</div>';
        }
        return;
      }

      const days = Math.floor(diff / 86400000);
      const hours = Math.floor((diff % 86400000) / 3600000);
      const minutes = Math.floor((diff % 3600000) / 60000);
      const seconds = Math.floor((diff % 60000) / 1000);

      setValue("days", pad(days));
      setValue("hours", pad(hours));
      setValue("minutes", pad(minutes));
      setValue("seconds", pad(seconds));
    }

    function syncPointer(event) {
      const x = `${event.clientX}px`;
      const y = `${event.clientY}px`;
      document.documentElement.style.setProperty("--mx", x);
      document.documentElement.style.setProperty("--my", y);
    }

    document.addEventListener("pointermove", syncPointer, { passive: true });
    updateCountdown();
    window.setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
